# Local development stack: Postgres + the API.
# For app-only dev, run `docker compose up -d postgres` and `npm run start:dev`.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: peoplehub
      POSTGRES_PASSWORD: peoplehub
      POSTGRES_DB: peoplehub
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U peoplehub']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://peoplehub:peoplehub@postgres:5432/peoplehub?schema=public
      JWT_ACCESS_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      FRONTEND_ORIGIN: http://localhost:3001
    ports:
      - '3000:3000'

volumes:
  pgdata:
